name: Deploy Reflex App

on:
  push:
    branches:
      - main # main 브랜치에 코드가 올라갈 때만 작동합니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Reflex
        # Streamlit 의 requirements.txt 가 아니라 Reflex 전용 deps 만 설치.
        run: pip install -r reflex_requirements.txt

      - name: Deploy to Reflex Cloud
        uses: reflex-dev/reflex-deploy-action@v1
        with:
          auth_token: ${{ secrets.REFLEX_AUTH_TOKEN }}
          project_id: ${{ secrets.REFLEX_PROJECT_ID }}
